<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우선순위 설정</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='priority.css') }}">
</head>

<body>
    <header class="top-nav">
        <div class="logo">AI 시간표 추천</div>

        <nav class="menu">
            <a href="{{ url_for('main.home') }}">홈</a>
            <a href="{{ url_for('recommend.priority') }}">시간표 추천</a>
            <a href="{{ url_for('main.graduation') }}">졸업요건</a>
            <a href="{{ url_for('chatbot.chatbot_page') }}">AI 챗봇</a>
        </nav>
    </header>

    <main class="page">
        <section class="priority-card">
            <p class="step-text">STEP 1</p>

            <h1>우선순위 설정</h1>

            <p class="desc">
                시간표 추천에서 가장 중요하게 반영할 항목을 조절해주세요.<br>
                모든 항목이 100이면 추천 정확도가 떨어질 수 있습니다.
            </p>

            <form action="{{ url_for('recommend.condition') }}" method="post" class="slider-list">

                <div class="slider-item">
                    <div class="slider-title">
                        <span>나는 공강이 꼭 필요하다</span>
                        <strong id="empty_day_value">80</strong>
                    </div>
                    <input
                        type="range"
                        name="empty_day"
                        min="0"
                        max="100"
                        value="80"
                        oninput="empty_day_value.textContent=this.value"
                    >
                </div>

                <div class="slider-item">
                    <div class="slider-title">
                        <span>아침 수업보단 오후 수업이 좋다</span>
                        <strong id="morning_value">50</strong>
                    </div>
                    <input
                        type="range"
                        name="morning"
                        min="0"
                        max="100"
                        value="50"
                        oninput="morning_value.textContent=this.value"
                    >
                </div>

                <div class="slider-item">
                    <div class="slider-title">
                        <span>학점/시험 난이도가 중요하다</span>
                        <strong id="difficulty_value">90</strong>
                    </div>
                    <input
                        type="range"
                        name="difficulty"
                        min="0"
                        max="100"
                        value="90"
                        oninput="difficulty_value.textContent=this.value"
                    >
                </div>

                <div class="slider-item">
                    <div class="slider-title">
                        <span>졸업요건 충족이 중요하다</span>
                        <strong id="graduation_value">30</strong>
                    </div>
                    <input
                        type="range"
                        name="graduation"
                        min="0"
                        max="100"
                        value="30"
                        oninput="graduation_value.textContent=this.value"
                    >
                </div>

                <button type="submit" class="next-btn">다음</button>
            </form>
        </section>
    </main>
</body>
</html>
